# Lefthook — Git hooks for code quality
# Install: bun add -d lefthook && bunx lefthook install

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx}'
      run: bunx oxlint {staged_files}
    format-check:
      glob: '*.{ts,tsx}'
      run: bunx oxfmt --check {staged_files}

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: cd sidecar && bun test || true
